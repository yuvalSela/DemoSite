name: CI/CD Demo

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EC2_APP_DIR: /home/ubuntu/demosite
  ECR_BACKEND_REPOSITORY: demosite-backend
  ECR_WEB_REPOSITORY: demosite-web

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Lint and Test (Mock)
      run: |
        echo "Running backend linting and tests..."
        # Add actual testing commands here (e.g., pytest)

  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
        
    - name: Install dependencies
      run: npm ci
        
    - name: Lint
      run: npm run lint --if-present
        
    - name: Build
      run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set image tags
      run: |
        echo "BACKEND_IMAGE=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_BACKEND_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_ENV"
        echo "WEB_IMAGE=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_WEB_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_ENV"

    - name: Build and push backend image
      run: |
        docker build -f backend/Dockerfile -t "$BACKEND_IMAGE" -t "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_BACKEND_REPOSITORY }}:latest" .
        docker push "$BACKEND_IMAGE"
        docker push "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_BACKEND_REPOSITORY }}:latest"

    - name: Build and push web image
      run: |
        docker build -f frontend/Dockerfile -t "$WEB_IMAGE" -t "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_WEB_REPOSITORY }}:latest" .
        docker push "$WEB_IMAGE"
        docker push "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_WEB_REPOSITORY }}:latest"

    - name: Configure SSH key
      run: |
        install -m 700 -d ~/.ssh
        printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519

    - name: Upload deployment manifest
      run: |
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "${{ vars.EC2_USER }}@${{ vars.EC2_HOST }}" "mkdir -p ${{ env.EC2_APP_DIR }}"
        scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no docker-compose.yml "${{ vars.EC2_USER }}@${{ vars.EC2_HOST }}:${{ env.EC2_APP_DIR }}/docker-compose.yml"

    - name: Deploy on EC2
      run: |
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "${{ vars.EC2_USER }}@${{ vars.EC2_HOST }}" <<EOF
        set -e
        mkdir -p ${{ env.EC2_APP_DIR }}
        cat > ${{ env.EC2_APP_DIR }}/.env <<ENVFILE
        BACKEND_IMAGE=$BACKEND_IMAGE
        WEB_IMAGE=$WEB_IMAGE
        SERVER_NAME=${{ vars.SERVER_NAME }}
        ENVFILE
        aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
        cd ${{ env.EC2_APP_DIR }}
        docker compose pull
        docker compose up -d --remove-orphans
        EOF